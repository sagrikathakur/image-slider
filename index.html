<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Scroll Card Showcase</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Ambient background elements -->
  <div class="ambient-light"></div>
  <div class="noise-overlay"></div>
  <div class="grid-background"></div>

  <div class="app-container">
    <div class="sticky-container">
      <div class="card-glow"></div>
      <div class="card-wrapper">
        <div class="pokemon-card" id="pokemon-card">
          <div class="card-glare" id="card-glare"></div>
          <div class="card-content">
            <div class="poke-image-container">
              <div class="poke-image-bg"></div>
              <img src="assets/pikachu.png" alt="Pokemon" class="poke-image floating" id="poke-image">
            </div>
            <div class="pokemon-info">
              <div class="pokemon-number" id="pokemon-number">#025</div>
              <h2 class="pokemon-name" id="pokemon-name">Pikachu</h2>
              <div class="type-badges" id="type-badges">
                <span class="type-badge Electric">Electric</span>
              </div>
              <p class="pokemon-type" id="pokemon-type">Mouse Pokémon</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="scroll-container" id="scroll-container">
      <!-- Pokémon sections will be dynamically injected here by script.js -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
